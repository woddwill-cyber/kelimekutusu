  .sub{ color:var(--ink-soft); font-size:15px; margin-bottom:18px; }

  .progress-rail{ display:flex; justify-content:center; gap:4px; flex-wrap:wrap; margin:0 auto 26px; max-width:620px; }
  .dot{ width:13px;height:17px; background:var(--card); border:1px solid var(--kraft-light); border-radius:2px; position:relative; transition:all .25s ease; }
  .dot::before{ content:''; position:absolute; top:3px; left:2px; right:2px; height:1px; background:var(--line); box-shadow:0 3px 0 var(--line); }
  .dot.learning{ background:var(--kraft-light); border-color:var(--kraft); }
  .dot.known{ background:var(--sage); border-color:var(--sage); }
  .dot.known::before{ display:none; }

  nav.tabs{ display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-bottom:22px; }
  nav.tabs button{ font-family:'Space Mono', monospace; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; background:var(--paper-dark); border:1.5px solid var(--kraft-light); border-bottom:none; color:var(--ink-soft); padding:10px 16px 8px; cursor:pointer; border-radius:6px 6px 0 0; position:relative; top:1px; }
  nav.tabs button.active{ background:var(--card); color:var(--stamp-dark); border-color:var(--kraft); box-shadow: 0 -3px 8px rgba(43,58,74,0.06); }

  .panel{ background:var(--card); border:1.5px solid var(--kraft); border-radius:0 8px 8px 8px; padding:28px 24px; box-shadow:var(--shadow); min-height:380px; }

  .fc-word{ font-size:34px; font-weight:700; margin-bottom:6px; text-align:center; }
  .fc-example{ font-size:14px; color:var(--ink-soft); text-align:center; line-height:1.5; max-width:340px; margin:0 auto; }
  .fc-controls{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }

  .story-empty{ text-align:center; padding:36px 10px; max-width:460px; margin:0 auto; }
  .story-meta{ display:flex; justify-content:space-between; align-items:center; font-family:'Space Mono',monospace; font-size:12px; color:var(--ink-soft); margin-bottom:18px; flex-wrap:wrap; gap:10px; }
  .story-title{ font-size:26px; font-weight:700; font-style:italic; margin-bottom:16px; color:var(--stamp-dark); }

  .story-word{ background:var(--sage-light); border-bottom:1.5px dotted var(--sage); padding:0 2px; border-radius:2px; font-weight:600; color:var(--sage); }
  
  button.btn{ font-family:'Space Mono',monospace; font-size:12px; letter-spacing:0.04em; padding:10px 18px; border-radius:5px; border:1.5px solid var(--kraft); background:var(--paper-dark); color:var(--ink); cursor:pointer; transition:transform .12s ease; }

  .m-card.wrong{ animation:shake .35s; border-color:var(--stamp); }

// Buluta Veri Yazma Fonksiyonu
function updateCloudStats(en, success) {
  const docRef = db.collection('userStats').doc(userCode).collection('words').doc(en);
  
  db.runTransaction(transaction => {
    return transaction.get(docRef).then(doc => {
      let dogru = 0, yanlis = 0;
      if (doc.exists) {
        dogru = doc.data().dogru || 0;
        yanlis = doc.data().yanlis || 0;
      }
      if (success) dogru++; else yanlis++;
      transaction.set(docRef, { en: en, dogru: dogru, yanlis: yanlis }, {merge: true});
    });
  }).catch(err => console.log("Bulut kaydı hatası:", err));
}

let WORDS = [];
const LIMIT = 30;
let mastery = {};

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function selectNewSet() {
  const karisik = shuffle([...ALL_WORDS]);
  WORDS = karisik.slice(0, Math.min(LIMIT, ALL_WORDS.length));
  document.getElementById('eyebrowLabel').textContent = WORDS.length + ' kart · sözcük çekmecesi';
  document.getElementById('subLabel').textContent = 'Kartları çevir, eşleştir, sına — ' + WORDS.length + ' kelimeyi kalıcı hafızaya yerleştir.';

  mastery = {};
  WORDS.forEach(w => mastery[w.en] = 'new');

  storyState = { text:null, title:null, loading:false, error:null, usedWords:[] };
  matchState = null;
  quizState = null;
  typeState = null;

  renderProgress();
  const aktifTab = document.querySelector('nav.tabs button.active');
  if(aktifTab) render(aktifTab.dataset.tab);
}

function bumpMastery(en, success){
  const cur = mastery[en];
  if(success){
    mastery[en] = (cur === 'learning') ? 'known' : 'learning';
  } else {
    if(cur !== 'known') mastery[en] = 'learning';
  }
  updateCloudStats(en, success); // BULUTA YAZ
  renderProgress();
}

  const rail = document.getElementById('progressRail');
  rail.innerHTML = '';
  WORDS.forEach(w=>{
    const d = document.createElement('div');
    d.className = 'dot ' + (mastery[w.en] === 'known' ? 'known' : mastery[w.en] === 'learning' ? 'learning' : '');
    d.title = w.en;
    rail.appendChild(d);
  });
}

// ================= STORY =================
let storyState = { text:null, title:null, loading:false, error:null, usedWords:[] };

const STORY_SETTINGS = [ "a small coastal fishing town","a busy hospital ward at night","a quiet mountain village","an old university library","a rainy city office" ];
const STORY_CHARACTERS = [ "a nervous young teacher","two arguing siblings","a retired sailor","a shy new student","a tired night-shift nurse" ];

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function highlightStory(text){
  const sorted = WORDS.slice().sort((a,b)=> b.en.length - a.en.length);
  const alternation = sorted.map(w => w.en.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|');
  const regex = new RegExp('\\b(' + alternation + ')[a-zA-Z]*\\b', 'gi');
  const used = new Set();
  const escaped = escapeHtml(text);
  const highlighted = escaped.replace(regex, (match) => {
    const lower = match.toLowerCase();
    const w = sorted.find(x => lower.startsWith(x.en.toLowerCase()));
    if(!w) return match;
    used.add(w.en);
    return `<span class="story-word" title="${w.tr} · ${w.pos}">${match}</span>`;
  });
  return { html: highlighted, used: [...used] };
}

async function generateStory(){
  storyState.loading = true;
  storyState.error = null;
  renderStory();

  const setting = pick(STORY_SETTINGS);
  const character = pick(STORY_CHARACTERS);
  const wordList = WORDS.map(w=>w.en).join(', ');

  const prompt = `Write a short, engaging, ORIGINAL English story at CEFR B1 level (roughly 180-260 words).
Setting inspiration: ${setting}. Main character(s) inspiration: ${character}. Feel free to adapt these loosely.
Naturally use as many of the following words as possible (any grammatical form: plural, past tense, -ing, adverb form, etc. are all fine): ${wordList}.
Do not force every single word in if it breaks natural flow, but try hard to include most of them.
Write plain prose only: no markdown, no bullet points, no asterisks, no word list, no explanation.
First line: a short title (no more than 6 words). Then a blank line. Then the story itself, in 2-4 paragraphs.`;

  const geminiApiKey = "BURAYA_YENI_GEMINI_ANAHTARINI_YAZIN"; // Google AI Studio'dan aldığın anahtarı buraya gir!
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiApiKey}`;

  try{
    const response = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || 'API Hatası');

    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    if(!raw) throw new Error('empty');

    const lines = raw.split('\n').map(l=>l.trim()).filter(l=>l.length);
    const title = lines[0];
    const body = lines.slice(1).join('\n\n');

    const { html, used } = highlightStory(body);
    storyState = { text: html, title, loading:false, error:null, usedWords: used };
  } catch(err){
    storyState = { text:null, title:null, loading:false, error:'Hikaye oluşturulamadı: ' + err.message, usedWords:[] };
  }
  renderStory();
}

function renderStory(){
  if(storyState.loading){
    panel.innerHTML = `<div class="story-empty"><div class="fc-pos">HİKAYE YAZILIYOR</div><div class="fc-word" style="font-size:22px;">Kelimelerin geçtiği eşsiz bir B1 hikaye hazırlanıyor…</div></div>`;
    return;
  }
  if(storyState.error){
    panel.innerHTML = `<div class="story-empty"><div class="fc-pos" style="color:var(--stamp-dark);">HATA</div><div class="fc-example">${storyState.error}</div><div class="fc-controls" style="margin-top:18px;"><button class="btn primary" id="storyGen">Tekrar Dene</button></div></div>`;
    document.getElementById('storyGen').onclick = generateStory;
    return;
  }
  if(!storyState.text){
    panel.innerHTML = `<div class="story-empty"><div class="fc-pos">HER TIKLAMADA YENİ BİR HİKAYE</div><div class="fc-word" style="font-size:24px;">Kelime listesini kullanan bir B1 hikayesi okumaya hazır mısın?</div><div class="fc-example" style="margin-top:6px;">Hikayede geçen ${WORDS.length} kelimeden biri, altı çizili olarak vurgulanır — üzerine gelince Türkçesini görürsün.</div><div class="fc-controls" style="margin-top:20px;"><button class="btn primary" id="storyGen">Hikaye Oluştur</button></div></div>`;
    document.getElementById('storyGen').onclick = generateStory;
    return;
  }
  const usedCount = storyState.usedWords.length;
  panel.innerHTML = `
    <div class="story-meta"><span>KULLANILAN KELİME: ${usedCount} / ${WORDS.length}</span><button class="btn stamp" id="storyGen">Yeni Hikaye Oluştur</button></div>
    <div class="story-title">${storyState.title || ''}</div>
    <div class="story-body">${storyState.text.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div>
  `;
  document.getElementById('storyGen').onclick = generateStory;
}

// ================= MATCHING =================
let matchState = null;

function newMatchRound(){
  const pool = shuffle(WORDS).slice(0, 8);
  const cards = [];
  pool.forEach((w,i)=>{ cards.push({key:i, type:'en', text:w.en, en:w.en}); cards.push({key:i, type:'tr', text:w.tr, en:w.en}); });
  matchState = { cards: shuffle(cards), selected: [], matched: new Set(), moves: 0, startTime: Date.now() };
}

function renderMatch(){
  if(!matchState) newMatchRound();
  const allMatched = matchState.matched.size === matchState.cards.length;
  if(allMatched){
    const seconds = Math.round((Date.now()-matchState.startTime)/1000);
    panel.innerHTML = `<div class="match-done"><div class="fc-pos">TAMAMLANDI</div><div class="fc-word">Tüm çiftler eşleşti 🎉</div><div class="fc-example">${matchState.moves} hamlede, ${seconds} saniyede.</div><div class="fc-controls" style="margin-top:20px;"><button class="btn primary" id="matchAgain">Yeni Tur</button></div></div>`;
    document.getElementById('matchAgain').onclick = ()=>{ matchState = null; renderMatch(); };
    return;
  }
  panel.innerHTML = `
    <div class="match-meta"><span>HAMLE: ${matchState.moves}</span><span>EŞLEŞEN: ${matchState.matched.size/2} / ${matchState.cards.length/2}</span></div>
    <div class="match-grid" id="matchGrid"></div>
    <div class="fc-controls" style="margin-top:18px;"><button class="btn" id="matchReset">Yeni Kartlarla Başla</button></div>
  `;
  const grid = document.getElementById('matchGrid');
  matchState.cards.forEach((c, idx)=>{
    const el = document.createElement('div');
    const isMatched = matchState.matched.has(idx);
    const isSelected = matchState.selected.includes(idx);
    el.className = 'm-card ' + (c.type==='tr'?'tr ':'') + (isMatched?'matched':'') + (isSelected?'selected':'');
    el.textContent = c.text; el.dataset.idx = idx;
    if(!isMatched) el.onclick = ()=> handleMatchClick(idx);
    grid.appendChild(el);
  });
  document.getElementById('matchReset').onclick = ()=>{ matchState = null; renderMatch(); };
}

function handleMatchClick(idx){
  if(matchState.selected.includes(idx)) return;
  if(matchState.selected.length === 2) return;
  matchState.selected.push(idx);
  if(matchState.selected.length === 2){
    matchState.moves++;
    const [a,b] = matchState.selected;
    const cardA = matchState.cards[a], cardB = matchState.cards[b];
    if(cardA.key === cardB.key && cardA.type !== cardB.type){
      matchState.matched.add(a); matchState.matched.add(b);
      bumpMastery(cardA.en, true);
      matchState.selected = []; renderMatch();
    } else {
      renderMatch();
      setTimeout(()=>{ matchState.selected = []; renderMatch(); }, 550);
    }
  } else renderMatch();
}

// ================= QUIZ =================
let quizState = null;

function newQuiz(){
  const order = shuffle(WORDS);
  quizState = { order, index:0, correct:0, answered:false };
}

function renderQuiz(){
  if(!quizState) newQuiz();
  if(quizState.index >= quizState.order.length){
    panel.innerHTML = `<div class="quiz-end"><div class="fc-pos">SONUÇ</div><div class="quiz-score">${quizState.correct} / ${quizState.order.length}</div><div class="fc-example">${quizState.correct === quizState.order.length ? 'Mükemmel! Hepsini bildin.' : 'İyi iş — zayıf kaldığın kelimeleri kartlarla tekrar et.'}</div><div class="fc-controls" style="margin-top:20px;"><button class="btn primary" id="quizAgain">Tekrar Dene</button></div></div>`;
    document.getElementById('quizAgain').onclick = ()=>{ quizState = null; renderQuiz(); };
    return;
  }
  const w = quizState.order[quizState.index];
  const wrongPool = shuffle(WORDS.filter(x=>x.en!==w.en)).slice(0,3).map(x=>x.tr);
  const options = shuffle([w.tr, ...wrongPool]);

  panel.innerHTML = `
    <div class="quiz-meta"><span>SORU ${quizState.index+1} / ${quizState.order.length}</span><span>DOĞRU: ${quizState.correct}</span></div>
    <div class="quiz-prompt"><div class="quiz-word">${w.en}</div><div class="quiz-instruction">bu kelimenin anlamı nedir?</div></div>
    <div class="quiz-options" id="quizOptions"></div><div class="quiz-feedback" id="quizFeedback"></div>
  `;
  const optsEl = document.getElementById('quizOptions');
  options.forEach(opt=>{
    const b = document.createElement('button');
    b.className = 'q-opt'; b.textContent = opt;
    b.onclick = ()=> handleQuizAnswer(opt, w, optsEl);
    optsEl.appendChild(b);
  });
}

function handleQuizAnswer(opt, w, optsEl){
  if(quizState.answered) return;
  quizState.answered = true;
  const buttons = [...optsEl.children];
  buttons.forEach(b=>{
    b.disabled = true;
    if(b.textContent === w.tr) b.classList.add('correct');
    else if(b.textContent === opt) b.classList.add('incorrect');
  });
  const success = opt === w.tr;
  if(success) quizState.correct++;
  bumpMastery(w.en, success);
  document.getElementById('quizFeedback').textContent = success ? 'Doğru! ' + w.ex.replace('___', w.en) : 'Doğrusu: ' + w.tr + '  ·  ' + w.ex.replace('___', w.en);
  setTimeout(()=>{ quizState.index++; quizState.answered = false; renderQuiz(); }, 1600);
}

// ================= TYPING =================
let typeState = null;

function newTypeRound(){
  const order = shuffle(WORDS);
  typeState = { order, index:0, correct:0, checked:false, wrong:[] };
}

function renderType(){
  if(!typeState) newTypeRound();
  if(typeState.index >= typeState.order.length){
    const wrongList = typeState.wrong.map(w => `<div class="review-row"><div class="review-en">${w.en}</div><div class="review-mid"><div class="review-tr">${w.tr}</div><div class="review-ex">${w.ex.replace('___', w.en)}</div></div><div class="review-given">${w.given ? 'yazdığın: “' + w.given + '”' : 'boş bırakıldı'}</div></div>`).join('');
    panel.innerHTML = `<div class="quiz-end"><div class="fc-pos">SONUÇ</div><div class="quiz-score">${typeState.correct} / ${typeState.order.length}</div><div class="fc-example">Yazarak hatırlamak en kalıcı yöntemdir.</div><div class="fc-controls" style="margin-top:20px;"><button class="btn primary" id="typeAgain">Tekrar Dene</button></div></div>${typeState.wrong.length ? `<div class="review-section"><div class="review-title">Yanlış / Eksik Yazılanlar (${typeState.wrong.length})</div>${wrongList}</div>` : `<div class="review-section"><div class="review-title" style="color:var(--sage);">Hepsini doğru yazdın 🎉</div></div>`}`;
    document.getElementById('typeAgain').onclick = ()=>{ typeState = null; renderType(); };
    return;
  }
  const w = typeState.order[typeState.index];
  panel.innerHTML = `
    <div class="type-meta"><span>SORU ${typeState.index+1} / ${typeState.order.length}</span><span>DOĞRU: ${typeState.correct}</span></div>
    <div class="type-prompt"><div class="type-tr">${w.tr}</div><div class="type-example">${w.ex.split('___')[0]}<span class="type-blank">______</span>${w.ex.split('___')[1]}</div></div>
    <div class="type-row"><input class="type-input mono" id="typeInput" placeholder="İngilizcesini yaz" autocomplete="off" spellcheck="false"><button class="btn primary" id="typeCheck">Kontrol Et</button></div>
    <div class="type-feedback" id="typeFeedback"></div>
  `;
  const input = document.getElementById('typeInput');
  input.focus();
  const check = ()=>{
    if(typeState.checked) return;
    typeState.checked = true;
    const val = input.value.trim().toLowerCase();
    const success = val === w.en.toLowerCase();
    input.classList.add(success ? 'correct' : 'incorrect');
    input.disabled = true;
    if(success) typeState.correct++; else typeState.wrong.push({...w, given: val});
    bumpMastery(w.en, success);
    document.getElementById('typeFeedback').textContent = success ? 'Doğru!' : `Doğrusu: "${w.en}"`;
    setTimeout(()=>{ typeState.index++; typeState.checked = false; renderType(); }, 1400);
  };
  document.getElementById('typeCheck').onclick = check;
  input.addEventListener('keydown', e=>{ if(e.key === 'Enter') check(); });
}

// 🎯 Odaklı Yazma Fonksiyonu
async function renderFocusedType() {
  // Veriler gelene kadar ekrana yükleme animasyonu çiz
  panel.innerHTML = `
    <div class="fc-pos">BULUTTAN EN ÇOK HATA YAPTIĞIN KELİMELER ANALİZ EDİLİYOR...</div>
    <div style="text-align:center; padding:20px; font-size:24px;">⏳</div>
  `;
  
  try {
    const snapshot = await db.collection('userStats').doc(userCode).collection('words').get();
    let stats = [];
    
    snapshot.forEach(doc => {
      let data = doc.data();
      let wordObj = ALL_WORDS.find(w => w.en === data.en);
      if(wordObj && data.yanlis > 0) {
        stats.push({ ...wordObj, yanlis: data.yanlis });
      }
    });
    
    // Eğer hiç yanlış yapılan kelime yoksa tatlı bir mesaj göster
    if (stats.length === 0) {
      panel.innerHTML = `
        <div class="fc-pos" style="color:var(--sage);">HARİKA HABER!</div>
        <div class="fc-example" style="margin-top:20px;">Bulutta henüz hiç hatalı kelimen yok. Normal yazma alıştırmasına veya diğer modlara geçebilirsin! 🎉</div>
      `;
      return;
    }
    
    // En çok hata yapılanları sırala ve ilk 10'unu al
    stats.sort((a,b) => b.yanlis - a.yanlis);
    const top10 = stats.slice(0, 10);
    
    // Kelime havuzunu geçici olarak bu 10 kelimeyle sınırla ve karıştır
    WORDS = shuffle(top10);
    
    // Üst bilgileri güncelle
    document.getElementById('eyebrowLabel').textContent = WORDS.length + ' odaklı kart · sözcük çekmecesi';
    document.getElementById('subLabel').textContent = '🎯 En çok zorlandığın ' + WORDS.length + ' kelimeyi yazarak hafızaya kazı.';
    
    mastery = {};
    WORDS.forEach(w => mastery[w.en] = 'new');
    renderProgress();
    
    // Yazma alıştırmasının state'ini sıfırla ve asıl yazma ekranını çiz
    typeState = null; 
    renderType();
    
  } catch (error) {
    console.error(error);
    panel.innerHTML = `<div class="fc-pos" style="color:var(--stamp-dark)">HATA OLUŞTU</div><div class="fc-example">Veriler çekilemedi. İnternet bağlantını kontrol et.</div>`;
  }
}
